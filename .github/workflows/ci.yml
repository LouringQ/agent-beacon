name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Byte-compile the hooks (stdlib only, no deps)
        run: python -m py_compile beacon_core.py beacon_approve.py beacon_done.py beacon_dashboard.py beacon_menubar.py
      - name: Unit tests (no network)
        run: python -m unittest discover -s tests -v
